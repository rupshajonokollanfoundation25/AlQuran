<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quran in Bangla — Read, Listen, Search, Understand</title>
<meta name="description" content="Quran with Arabic text, Bengali translation and recitation — fully usable offline.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#092723">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="কুরআন বাংলা">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+Bengali:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">

<header>
  <button class="menu-btn" id="menuBtn" aria-label="মেনু খুলুন">☰</button>
  <div class="wordmark"><span class="ar">قرآن</span><span class="bn" id="headerTitle">Quran Bangla</span></div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="আয়াত খুঁজুন...">
  </div>
  <div class="header-actions">
    <span class="conn-status" id="connStatus"></span>
    <button class="icon-btn install-btn" id="installBtn" style="display:none;">⬇ install app</button>
    <button class="icon-btn" id="themeBtn"><span id="themeLabel">night mode</span></button>
  </div>
</header>

<div class="app-shell">

  <!-- ================= HOME ================= -->
  <section class="view active" id="view-home">
    <div id="homeLanding">
      <div class="section-title" id="lastReadTitle" style="display:none;">সর্বশেষ পড়েছিলেন</div>
      <div class="chip-row" id="lastReadChips"></div>
      <div class="section-title">কুইক লিংক</div>
      <div class="chip-row" id="quickLinkChips"></div>
      <div class="home-subtabs" id="homeSubtabs">
        <button data-mode="surah" class="active">সূরা</button>
        <button data-mode="page">পৃষ্ঠা</button>
        <button data-mode="juz">পারা</button>
        <button data-mode="hizb">হিজব</button>
        <button data-mode="ruku">রুকু</button>
      </div>
      <div id="homeListContainer"><div class="loader"><div class="spinner"></div><span>Loading...</span></div></div>
    </div>
    <div id="readerArea" style="display:none;">
      <button class="back-btn" id="readerBackBtn">← ফিরে যান</button>
      <div class="toolbar" id="readerToolbar" style="display:none;">
        <button class="icon-btn" id="decFont">front −</button>
        <button class="icon-btn" id="incFont">front +</button>
      </div>
      <div id="mainContent"></div>
    </div>
  </section>

  <!-- ================= PLANNER ================= -->
  <section class="view" id="view-planner">
    <div class="tabs" id="plannerTabs">
      <button id="plTabMine" class="active">আমার প্ল্যানার</button>
      <button id="plTabFind">প্ল্যানার খুঁজুন</button>
      <button id="plTabDone">সম্পন্ন হয়েছে</button>
    </div>
    <div id="plannerListContainer"></div>
  </section>

  <!-- ================= TOPICS ================= -->
  <section class="view" id="view-topics">
    <div id="topicsListContainer"></div>
    <div id="topicDetailContainer" style="display:none;">
      <button class="back-btn" id="topicBackBtn">← ফিরে যান</button>
      <div id="topicDetailBody"></div>
    </div>
  </section>

  <!-- ================= LIBRARY ================= -->
  <section class="view" id="view-library">
    <div class="tabs" id="libraryTabs">
      <button id="libTabBookmarks" class="active">Reserved</button>
      <button id="libTabHistory">History</button>
      <button id="libTabOffline">Offline</button>
    </div>
    <div id="libraryListContainer"></div>
  </section>

  <!-- ================= STATS ================= -->
  <section class="view" id="view-stats">
    <div id="statsContainer"></div>
  </section>

</div>

<!-- Bottom navigation -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bn-item active" data-view="home">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
    <span>হোম</span>
  </button>
  <button class="bn-item" data-view="planner">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 3v3M16 3v3"/></svg>
    <span>প্ল্যানার</span>
  </button>
  <button class="bn-item" data-view="topics">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
    <span>বিষয়ভিত্তিক</span>
  </button>
  <button class="bn-item" data-view="library">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h6a3 3 0 013 3v13a2.5 2.5 0 00-2.5-2.5H4z"/><path d="M20 4h-6a3 3 0 00-3 3v13a2.5 2.5 0 012.5-2.5H20z"/></svg>
    <span>লাইব্রেরি</span>
  </button>
  <button class="bn-item" data-view="stats">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
    <span>পরিসংখ্যান</span>
  </button>
</nav>

<!-- Hamburger "more" drawer -->
<div class="scrim" id="scrim" style="display:none;"></div>
<aside id="moreDrawer">
  <div class="drawer-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="মেনুতে খুঁজুন...">
  </div>
  <div class="drawer-list">
    <button class="drawer-item" id="drawerGoToAyah"><span class="di-ic">⤴</span> নির্দিষ্ট আয়াতে যান</button>
    <button class="drawer-item" id="drawerNotifications"><span class="di-ic">🔔</span> নোটিফিকেশন <span class="di-badge">৩</span></button>
    <button class="drawer-item" id="drawerPrayerTimes"><span class="di-ic">🕐</span> সালাতের সময়সূচি</button>
    <button class="drawer-item" id="drawerDictionary"><span class="di-ic">📖</span> অভিধান</button>
    <button class="drawer-item" id="drawerOtherApps"><span class="di-ic">📱</span> আমাদের অন্যান্য অ্যাপস</button>
    <button class="drawer-item" id="drawerSettings"><span class="di-ic">⚙️</span> সেটিংস</button>
    <button class="drawer-item" id="drawerRateUs"><span class="di-ic">⭐</span> অ্যাপ রেটিং দিন</button>
    <button class="drawer-item" id="drawerTutorial"><span class="di-ic">▶</span> টিউটোরিয়াল দেখুন</button>
    <button class="drawer-item" id="drawerTranslationHelp"><span class="di-ic">🅰</span> অনুবাদে সহায়তা করুন</button>
    <button class="drawer-item" id="drawerShare"><span class="di-ic">🔗</span> অ্যাপটি শেয়ার করুন</button>
    <button class="drawer-item" id="drawerHelp"><span class="di-ic">❓</span> সাহায্য ও সহযোগিতা</button>
    <button class="drawer-item" id="drawerFeedback"><span class="di-ic">💬</span> ফীডব্যাক শেয়ার করুন</button>
  </div>
  <div class="drawer-social">
    <a href="#" title="Website">🌐</a>
    <a href="#" title="Facebook">📘</a>
    <a href="#" title="Instagram">📷</a>
    <a href="#" title="X">✕</a>
  </div>
</aside>

<div class="search-panel" id="searchPanel" style="display:none;">
  <div class="search-box">
    <div class="search-box-head">
      <h3 id="searchTitle">Search results</h3>
      <button id="closeSearch">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-info">
    <div class="pi-ref" id="playerRef">—</div>
    <div class="pi-title" id="playerTitle">Nothing is happening.</div>
  </div>
  <div class="player-controls">
    <button id="prevBtn" title="Next verse" aria-label="Next verse">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 10 7V5z"/></svg>
    </button>
    <button id="playPauseBtn" class="big" title="Play or pause" aria-label="Play or pause">
      <span class="buffer-ring"></span>
      <svg class="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg class="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
    </button>
    <button id="nextBtn" title="Next verse" aria-label="Next verse">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM4.5 6v12l10-6z"/></svg>
    </button>
  </div>
  <button class="player-close" id="playerClose" title="Close the player." aria-label="Close the player.">✕</button>
  <div class="player-progress">
    <span id="curTime">০:০০</span>
    <input type="range" id="seekBar" min="0" max="100" value="0">
    <span id="durTime">০:০০</span>
  </div>
  <div class="player-extra">
    <button class="speed-btn" id="speedBtn" title="Playback speed">১x</button>
    <label class="reciter-field"><span class="reciter-ic">🎙️</span>
      <select id="reciterSelect"></select>
    </label>
    <label><input type="checkbox" id="autoplayChk" checked><span class="lbl-full">Play the next verse.</span></label>
  </div>
</div>

<audio id="audioEl" preload="none"></audio>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/player.js"></script>
<script src="js/reader.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/search.js"></script>
<script src="js/topics.js"></script>
<script src="js/planner.js"></script>
<script src="js/stats.js"></script>
<script src="js/nav.js"></script>
<script src="js/app.js"></script>
</body>
</html>
